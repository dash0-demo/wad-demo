name: terraform

on:
  pull_request:
    paths:
      - 'deployment/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'deployment/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deployment/terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "0"
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_region: ${{ vars.GCP_REGION }}
      TF_VAR_dash0_auth_token: ${{ secrets.DASH0_AUTH_TOKEN }}
      TF_VAR_dash0_api_token: ${{ secrets.DASH0_API_TOKEN }}
      TF_VAR_dash0_web_sdk_auth_token: ${{ secrets.DASH0_WEB_SDK_AUTH_TOKEN }}
    outputs:
      # JSON array of `{name, namespace}` entries whose pod template changed
      # during this apply — drives the `dash0-deploy-events` matrix. Empty
      # array (`[]`) means nothing was rolled out, so no events fan out.
      changed_services: ${{ steps.diff_manifests.outputs.changed_services }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=wad-demo/gke"

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const max = 60000;
            let plan = process.env.PLAN_STDOUT || '(no output)';
            if (plan.length > max) plan = plan.slice(0, max) + '\n... (truncated)';
            const body = `### Terraform plan\n\n<details><summary>Click to expand</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # From here on: only main-branch pushes / workflow_dispatch actually
      # apply — capture manifests before and after so the follow-up diff can
      # detect which services rolled out. `helm get manifest` fails silently
      # on first-ever install (release does not exist yet); the diff script
      # treats a missing file as an empty "before", so every workload counts
      # as new on the first apply.
      - name: install helm
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      # Cluster name is hard-coded here to match `cluster_name` default in
      # deployment/terraform/variables.tf. Bump both if you rename the cluster.
      #
      # Tolerant of a 404: on the first apply after a `terraform destroy` (or a
      # cluster-recreating change like Autopilot ↔ Standard), the cluster does
      # not exist yet and `helm get manifest` calls below just write empty
      # "before" files, which the diff script treats as everything-is-new.
      - name: kubeconfig (pre-apply, tolerant)
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        run: |
          gcloud container clusters get-credentials wad-demo \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            || echo "cluster does not exist yet — pre-apply manifests will be empty"

      - name: capture pre-apply helm manifests
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        run: |
          mkdir -p /tmp/manifest-before
          helm get manifest otel-demo -n otel-demo > /tmp/manifest-before/otel-demo.yaml 2>/dev/null || true
          helm get manifest dash0-operator -n dash0-system > /tmp/manifest-before/dash0-operator.yaml 2>/dev/null || true

      - name: terraform apply
        id: apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        run: terraform apply -auto-approve tfplan

      # Re-fetch credentials after apply: on a fresh cluster the pre-apply
      # kubeconfig step got a 404, and on any cluster-replacing apply the
      # endpoint has changed. Strict here — apply just succeeded, so the
      # cluster must exist.
      - name: kubeconfig (post-apply)
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        run: |
          gcloud container clusters get-credentials wad-demo \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}"

      - name: diff manifests to detect changed services
        id: diff_manifests
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        run: |
          mkdir -p /tmp/manifest-after
          helm get manifest otel-demo -n otel-demo > /tmp/manifest-after/otel-demo.yaml
          helm get manifest dash0-operator -n dash0-system > /tmp/manifest-after/dash0-operator.yaml
          python3 -m pip install --quiet --user pyyaml
          changed=$(python3 "$GITHUB_WORKSPACE/.github/scripts/detect_changed_services.py" /tmp/manifest-before /tmp/manifest-after)
          echo "Changed services: $changed"
          echo "changed_services=$changed" >> "$GITHUB_OUTPUT"

  # Fan out one `dash0.deployment` log event per demo service whose pod
  # template ACTUALLY changed in this apply — the terraform job's manifest
  # diff (`detect_changed_services.py`) drives the matrix dynamically. If
  # nothing changed the array is empty and this job is skipped, so the
  # Dash0 timeline reflects real rollouts, not every apply. A failed apply
  # also skips this job (GH Actions won't run a `needs:`-dependent job
  # unless the dependency succeeded).
  dash0-deploy-events:
    needs: terraform
    if: |
      needs.terraform.outputs.changed_services != '[]' && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.terraform.outputs.changed_services) }}
    steps:
      - name: send dash0.deployment event
        uses: dash0hq/dash0-cli/.github/actions/send-log-event@main
        with:
          otlp-url: ${{ vars.DASH0_OTLP_URL }}
          auth-token: ${{ secrets.DASH0_AUTH_TOKEN }}
          dataset: wad-demo
          event-name: dash0.deployment
          body: "Deployed ${{ matrix.service.name }} to the wad-demo cluster at commit ${{ github.sha }} on branch ${{ github.ref_name }} by ${{ github.actor }} via ${{ github.workflow }}#${{ github.run_id }}."
          severity-number: "9"
          severity-text: INFO
          service-name: ${{ matrix.service.name }}
          service-namespace: ${{ matrix.service.namespace }}
          deployment-name: wad-demo
          deployment-id: ${{ github.run_id }}
          deployment-status: succeeded
          vcs-repository-url: ${{ github.server_url }}/${{ github.repository }}
          vcs-ref-head-revision: ${{ github.sha }}
          vcs-ref-head-name: ${{ github.ref_name }}
          other-log-attributes: |
            github.workflow=${{ github.workflow }}
            github.run_id=${{ github.run_id }}
            github.run_attempt=${{ github.run_attempt }}
            github.actor=${{ github.actor }}
