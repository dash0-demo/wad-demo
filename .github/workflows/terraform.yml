name: terraform

on:
  pull_request:
    paths:
      - 'deployment/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'deployment/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deployment/terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "0"
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_region: ${{ vars.GCP_REGION }}
      TF_VAR_dash0_auth_token: ${{ secrets.DASH0_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=wad-demo/gke"

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const max = 60000;
            let plan = process.env.PLAN_STDOUT || '(no output)';
            if (plan.length > max) plan = plan.slice(0, max) + '\n... (truncated)';
            const body = `### Terraform plan\n\n<details><summary>Click to expand</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
