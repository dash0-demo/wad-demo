name: terraform

on:
  pull_request:
    paths:
      - 'deployment/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'deployment/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deployment/terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "0"
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_region: ${{ vars.GCP_REGION }}
      TF_VAR_dash0_auth_token: ${{ secrets.DASH0_AUTH_TOKEN }}
      TF_VAR_dash0_api_token: ${{ secrets.DASH0_API_TOKEN }}
      TF_VAR_dash0_web_sdk_auth_token: ${{ secrets.DASH0_WEB_SDK_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=wad-demo/gke"

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const max = 60000;
            let plan = process.env.PLAN_STDOUT || '(no output)';
            if (plan.length > max) plan = plan.slice(0, max) + '\n... (truncated)';
            const body = `### Terraform plan\n\n<details><summary>Click to expand</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: terraform apply
        id: apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        run: terraform apply -auto-approve tfplan

  # Fan out a dash0.deployment event per demo service (matching what the
  # otel-demo Helm chart deploys into `otel-demo`, plus the Dash0 operator
  # components in `dash0-operator`). Each event carries the service's own
  # service.name (and service.namespace where applicable) plus the VCS
  # attributes stamped on all telemetry, so Dash0/Agent0 can correlate an
  # alert on any single service with the exact commit that was deployed.
  dash0-deploy-events:
    needs: terraform
    if: |
      always() && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          # otel-demo application services (service.namespace unset)
          - { name: accounting,       namespace: "" }
          - { name: ad,               namespace: "" }
          - { name: cart,             namespace: "" }
          - { name: checkout,         namespace: "" }
          - { name: currency,         namespace: "" }
          - { name: email,            namespace: "" }
          - { name: flagd,            namespace: "" }
          - { name: fraud-detection,  namespace: "" }
          - { name: frontend,         namespace: "" }
          - { name: frontend-proxy,   namespace: "" }
          - { name: kafka,            namespace: "" }
          - { name: llm,              namespace: "" }
          - { name: load-generator,   namespace: "" }
          - { name: payment,          namespace: "" }
          - { name: postgresql,       namespace: "" }
          - { name: product-catalog,  namespace: "" }
          - { name: product-reviews,  namespace: "" }
          - { name: quote,            namespace: "" }
          - { name: recommendation,   namespace: "" }
          - { name: shipping,         namespace: "" }
          - { name: valkey-cart,      namespace: "" }
          # Dash0 operator components
          - { name: dash0-operator-collector, namespace: dash0-operator }
          - { name: operator-manager,         namespace: dash0-operator }
    steps:
      - name: send dash0.deployment event
        uses: dash0hq/dash0-cli/.github/actions/send-log-event@main
        with:
          otlp-url: ${{ vars.DASH0_OTLP_URL }}
          auth-token: ${{ secrets.DASH0_AUTH_TOKEN }}
          dataset: wad-demo
          event-name: dash0.deployment
          body: "${{ matrix.service.name }} terraform apply ${{ needs.terraform.result == 'success' && 'succeeded' || 'failed' }}"
          severity-number: ${{ needs.terraform.result == 'success' && '9' || '17' }}
          severity-text: ${{ needs.terraform.result == 'success' && 'INFO' || 'ERROR' }}
          service-name: ${{ matrix.service.name }}
          service-namespace: ${{ matrix.service.namespace }}
          deployment-name: wad-demo
          deployment-id: ${{ github.run_id }}
          deployment-status: ${{ needs.terraform.result == 'success' && 'succeeded' || 'failed' }}
          vcs-repository-url: ${{ github.server_url }}/${{ github.repository }}
          vcs-ref-head-revision: ${{ github.sha }}
          vcs-ref-head-name: ${{ github.ref_name }}
          other-log-attributes: |
            github.workflow=${{ github.workflow }}
            github.run_id=${{ github.run_id }}
            github.run_attempt=${{ github.run_attempt }}
            github.actor=${{ github.actor }}
