# Fork of opentelemetry-demo v2.2.0 src/frontend-proxy/envoy.tmpl.yaml with a
# Lua HTTP filter added to inject the Dash0 Web SDK <script> tag into HTML
# responses before they reach the browser.
#
# Envsubst runs against this file at container start (see the demo's
# frontend-proxy Dockerfile ENTRYPOINT), so:
#   - ${FOO} placeholders are expanded from the pod's environment.
#   - Values wired from Terraform (endpoint, token, service version, VCS attrs)
#     arrive as env vars via `components.frontend-proxy.envOverrides` in the
#     Helm release and are inlined into the Lua source below.
#
# When bumping otel_demo_chart_version, diff this against upstream:
#   https://github.com/open-telemetry/opentelemetry-demo/blob/<tag>/src/frontend-proxy/envoy.tmpl.yaml
# and reapply the Lua filter block.

static_resources:
  listeners:
    - address:
        socket_address:
          address: "${ENVOY_ADDR}"
          port_value: ${ENVOY_PORT}
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: ingress_http
                tracing:
                  spawn_upstream_span: true
                  provider:
                    name: envoy.tracers.opentelemetry
                    typed_config:
                      "@type": type.googleapis.com/envoy.config.trace.v3.OpenTelemetryConfig
                      grpc_service:
                        envoy_grpc:
                          cluster_name: opentelemetry_collector_grpc
                        timeout: 0.250s
                      service_name: ${OTEL_SERVICE_NAME}
                      resource_detectors:
                        - name: envoy.tracers.opentelemetry.resource_detectors.environment
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.tracers.opentelemetry.resource_detectors.v3.EnvironmentResourceDetectorConfig
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: frontend
                      domains:
                        - "*"
                      routes:
                        - match: { path: "/loadgen" }
                          redirect: { path_redirect: "/loadgen/" }
                        - match: { prefix: "/loadgen/" }
                          route: { cluster: loadgen, prefix_rewrite: "/" }
                        # `/otlp-http/*` is where the OTel demo's built-in
                        # OpenTelemetry Web SDK (baked into the Next.js
                        # frontend image, not something we can disable at
                        # source) POSTs OTLP traces. We're using the Dash0
                        # Web SDK instead (injected by the Lua filter
                        # below), so absorb these OTLP POSTs at the proxy
                        # — the SDK considers the batch delivered on any
                        # 2xx, and no duplicate frontend-web service
                        # lands in Dash0 via the operator's collector.
                        - match: { prefix: "/otlp-http/" }
                          direct_response: { status: 204 }
                        # `/_dash0/*` is the same-origin proxy the injected
                        # Dash0 Web SDK sends OTLP HTTP to (see Lua filter
                        # below, `SDK_URL = "/_dash0"`). Sending direct to
                        # ingress.eu-west-1.aws.dash0.com fails the CORS
                        # preflight from an unregistered origin; going via
                        # same-origin sidesteps CORS entirely. Envoy
                        # rewrites the path (/_dash0/v1/traces → /v1/traces),
                        # sets the SNI + Host header to the real hostname,
                        # and injects the Bearer token server-side so the
                        # public HTML never exposes it.
                        - match: { prefix: "/_dash0/" }
                          route:
                            cluster: dash0_ingest
                            prefix_rewrite: "/"
                            host_rewrite_literal: "${DASH0_WEB_SDK_UPSTREAM_HOST}"
                            timeout: 10s
                          request_headers_to_add:
                            - header:
                                key: "Authorization"
                                value: "Bearer ${DASH0_WEB_SDK_AUTH_TOKEN}"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                        - match: { path: "/jaeger" }
                          redirect: { path_redirect: "/jaeger/" }
                        - match: { prefix: "/jaeger/" }
                          route: { cluster: jaeger }
                        - match: { path: "/grafana" }
                          redirect: { path_redirect: "/grafana/" }
                        - match: { prefix: "/grafana/" }
                          route: { cluster: grafana }
                        - match: { prefix: "/images/" }
                          route: { cluster: image-provider, prefix_rewrite: "/" }
                        - match: { prefix: "/flagservice/" }
                          route: { cluster: flagservice, prefix_rewrite: "/", timeout: 0s }
                        - match: { prefix: "/feature" }
                          route:
                            cluster: flagd-ui
                            prefix_rewrite: "/"
                            upgrade_configs:
                              - upgrade_type: websocket
                        - match: { prefix: "/" }  # Default/catch-all route - keep last since prefix:"/" matches everything
                          route: { cluster: frontend }
                http_filters:
                  - name: envoy.filters.http.fault
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.fault.v3.HTTPFault
                      max_active_faults: 100
                      delay:
                        header_delay: {}
                        percentage:
                          numerator: 100
                  # --- Dash0 Web SDK injector ---
                  # Rewrites text/html response bodies to insert the Dash0 Web
                  # SDK IIFE bundle + init() call immediately before </head>.
                  # Strips Accept-Encoding on requests so upstream returns
                  # uncompressed HTML (LuaJIT string ops can't decode gzip).
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          -- The SDK POSTs OTLP HTTP to <SDK_URL>/v1/traces etc.
                          -- Using a same-origin path (proxied by the route
                          -- above) sidesteps the CORS preflight that
                          -- ingress.eu-west-1.aws.dash0.com rejects for
                          -- unregistered origins. The Bearer token is
                          -- injected server-side by Envoy, so the SDK
                          -- config carries an empty authToken and the
                          -- token never appears in the HTML.
                          --
                          -- SDK_URL must be an ABSOLUTE URL — the SDK builds
                          -- request URLs with `new URL(...)` which rejects
                          -- relative paths without a base. Build the origin
                          -- at runtime from window.location so the config
                          -- follows whatever host the demo is served on.
                          local SVC_VER = "${DASH0_WEB_SDK_SERVICE_VERSION}"
                          local SVC_NS = "${DASH0_WEB_SDK_SERVICE_NAMESPACE}"
                          local VCS_URL = "${DASH0_WEB_SDK_VCS_REPO_URL}"
                          local VCS_SHA = "${DASH0_WEB_SDK_VCS_HEAD_SHA}"

                          function envoy_on_request(request_handle)
                            request_handle:headers():replace("accept-encoding", "identity")
                          end

                          function envoy_on_response(response_handle)
                            local headers = response_handle:headers()
                            local ct = headers:get("content-type")
                            if ct == nil then return end
                            if not string.find(ct, "text/html", 1, true) then return end
                            if headers:get("content-encoding") ~= nil then return end
                            local body = response_handle:body(true)
                            if body == nil then return end
                            local length = body:length()
                            if length == 0 then return end
                            local s = tostring(body:getBytes(0, length))
                            -- See https://github.com/dash0hq/dash0-sdk-web/blob/main/INSTALL.md
                            --
                            -- The optional `window.seed` block is injected by
                            -- the load-generator's Playwright users (see
                            -- deployment/terraform/loadgen/locustfile.py's
                            -- seed_person). When present, we identify the
                            -- user and tag Web Monitoring signals with geo
                            -- attributes drawn from their seeded address.
                            -- Without it, every headless-Chromium session in
                            -- our GKE eu-west-1 pod IP range collapses to a
                            -- single anonymous German visitor.
                            local injection =
                              '<script>' ..
                              '(function(d,a,s,h,z,e,r,o){d[a]||((z=d[a]=function(){h.push(arguments)}),(z._t=new Date()),(z._v=1),(h=z._q=[]))})(window,"dash0");' ..
                              'dash0("init",{' ..
                                '"serviceName":"frontend-web",' ..
                                '"serviceVersion":"' .. SVC_VER .. '",' ..
                                '"endpoint":{"url":window.location.origin+"/_dash0","authToken":""}' ..
                              '});' ..
                              'dash0("addSignalAttribute","service.namespace","' .. SVC_NS .. '");' ..
                              'dash0("addSignalAttribute","vcs.repository.url.full","' .. VCS_URL .. '");' ..
                              'dash0("addSignalAttribute","vcs.ref.head.revision","' .. VCS_SHA .. '");' ..
                              'dash0("addSignalAttribute","vcs.provider.name","github");' ..
                              '(function(){var s=window.seed;if(!s)return;if(s.location){if(s.location.countryCode)dash0("addSignalAttribute","geo.country.iso_code",s.location.countryCode);if(s.location.continentCode)dash0("addSignalAttribute","geo.continent.code",s.location.continentCode);if(s.location.locality)dash0("addSignalAttribute","geo.locality.name",s.location.locality);}if(s.email)dash0("identify",s.email,{email:s.email});})();' ..
                              '</script>' ..
                              '<script defer crossorigin="anonymous" src="https://unpkg.com/@dash0/sdk-web@0.18.1/dist/dash0.iife.js"></script>'
                            local new_s, n = string.gsub(s, "</head>", injection .. "</head>", 1)
                            if n == 0 then return end
                            body:setBytes(new_s)
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                access_log:
                  - name: envoy.access_loggers.open_telemetry
                    typed_config:
                      "@type": "type.googleapis.com/envoy.extensions.access_loggers.open_telemetry.v3.OpenTelemetryAccessLogConfig"
                      common_config:
                        log_name: "otel_envoy_access_log"
                        grpc_service:
                          envoy_grpc:
                            cluster_name: opentelemetry_collector_grpc
                        transport_api_version: "V3"
                      body:
                        # yamllint disable-line rule:line-length
                        string_value: "[%START_TIME%] \"%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%\" %RESPONSE_CODE% %RESPONSE_FLAGS% %RESPONSE_CODE_DETAILS% %CONNECTION_TERMINATION_DETAILS% \"%UPSTREAM_TRANSPORT_FAILURE_REASON%\" %BYTES_RECEIVED% %BYTES_SENT% %DURATION% %RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)% \"%REQ(X-FORWARDED-FOR)%\" \"%REQ(USER-AGENT)%\" \"%REQ(X-REQUEST-ID)%\" \"%REQ(:AUTHORITY)%\" \"%UPSTREAM_HOST%\" %UPSTREAM_CLUSTER% %UPSTREAM_LOCAL_ADDRESS% %DOWNSTREAM_LOCAL_ADDRESS% %DOWNSTREAM_REMOTE_ADDRESS% %REQUESTED_SERVER_NAME% %ROUTE_NAME%\n"
                      resource_attributes:
                        values:
                          - key: "service.name"
                            value:
                              string_value: ${OTEL_SERVICE_NAME}
                      attributes:
                        values:
                          - key: "destination.address"
                            value:
                              string_value: "%UPSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                          - key: "event.name"
                            value:
                              string_value: "proxy.access"
                          - key: "server.address"
                            value:
                              string_value: "%DOWNSTREAM_LOCAL_ADDRESS%"
                          - key: "source.address"
                            value:
                              string_value: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                          - key: "upstream.cluster"
                            value:
                              string_value: "%UPSTREAM_CLUSTER%"
                          - key: "upstream.host"
                            value:
                              string_value: "%UPSTREAM_HOST%"
                          - key: "user_agent.original"
                            value:
                              string_value: "%REQ(USER-AGENT)%"
                          - key: "url.full"
                            value:
                              string_value: "%REQ(:SCHEME)%://%REQ(:AUTHORITY)%%REQ(:PATH)%"
                          - key: "url.path"
                            value:
                              string_value: "%REQ(:PATH)%"
                          - key: "url.query"
                            value:
                              string_value: "%REQ(:QUERY)%"
                          - key: "url.template"
                            value:
                              string_value: "%ROUTE_NAME%"
  clusters:
    - name: opentelemetry_collector_grpc
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: opentelemetry_collector_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${OTEL_COLLECTOR_HOST}
                      port_value: ${OTEL_COLLECTOR_PORT_GRPC}
    - name: frontend
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: frontend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${FRONTEND_HOST}
                      port_value: ${FRONTEND_PORT}
    - name: image-provider
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: image-provider
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${IMAGE_PROVIDER_HOST}
                      port_value: ${IMAGE_PROVIDER_PORT}
    - name: flagservice
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: flagservice
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${FLAGD_HOST}
                      port_value: ${FLAGD_PORT}
    - name: flagd-ui
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: flagd-ui
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${FLAGD_UI_HOST}
                      port_value: ${FLAGD_UI_PORT}
    - name: loadgen
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: loadgen
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${LOCUST_WEB_HOST}
                      port_value: ${LOCUST_WEB_PORT}
    - name: grafana
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: grafana
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${GRAFANA_HOST}
                      port_value: ${GRAFANA_PORT}
    - name: jaeger
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: jaeger
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${JAEGER_HOST}
                      port_value: ${JAEGER_UI_PORT}
    # Upstream cluster for the same-origin `/_dash0/*` proxy route. LOGICAL_DNS
    # so the hostname resolves per-request (Dash0 ingest is fronted by a CDN
    # with rotating IPs); SNI is set to the real hostname so TLS validates.
    - name: dash0_ingest
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      dns_lookup_family: V4_ONLY
      connect_timeout: 5s
      load_assignment:
        cluster_name: dash0_ingest
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: "${DASH0_WEB_SDK_UPSTREAM_HOST}"
                      port_value: 443
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: "${DASH0_WEB_SDK_UPSTREAM_HOST}"
admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: ${ENVOY_ADMIN_PORT}
layered_runtime:
  layers:
    - name: static_layer_0
      static_layer:
        envoy:
          resource_limits:
            listener:
              example_listener_name:
                connection_limit: 10000
