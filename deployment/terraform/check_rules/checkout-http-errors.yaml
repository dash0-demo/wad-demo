apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: checkout-http-errors
spec:
  groups:
    - name: Alerting
      interval: 1m0s
      rules:
        - alert: 'checkoutservice: HTTP Error Rate'
          expr: 'sum(increase({otel_metric_name="dash0.spans", service_name="checkoutservice", otel_span_status_code="ERROR"}[1m])) > $__threshold'
          for: 0s
          keep_firing_for: 0s
          annotations:
            summary: HTTP Errors on Checkout Service
            description: >-
              The number of ERROR-status spans from checkoutservice has exceeded the threshold over
              the last 1-minute window. The previous expression used http_response_status_code != "200"
              which matched all gRPC child spans (which report status code 0 by design) and produced
              ~280 false positives per minute. This expression uses otel_span_status_code="ERROR" to
              count spans that actually failed. Degraded fires at 10 errors/min, Critical at 50 errors/min.
            dash0-threshold-degraded: "10"
            dash0-threshold-critical: "50"
            dash0-enabled: "true"
          labels: {}
