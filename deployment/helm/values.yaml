# Helm values for the OpenTelemetry demo when paired with the Dash0 operator.
# Tested against chart open-telemetry/opentelemetry-demo 0.40.9 (appVersion 2.2.0).
#
# The bundled opentelemetry-collector subchart is disabled — the Dash0 operator
# deploys and configures its own collectors. The demo apps' OpenTelemetry SDKs
# are redirected to the operator's collector service via OTEL_COLLECTOR_NAME.
#
# Sibling resources managed by Terraform:
#   - dash0-operator (Helm release in `dash0-system`)
#   - Dash0OperatorConfiguration (auto-created by the operator chart when
#     `operator.dash0Export.enabled=true`)
#   - Dash0Monitoring (in `otel-demo`, with instrumentWorkloads.mode=none so
#     the operator's LD_PRELOAD injector does not double-instrument apps that
#     already carry their own OpenTelemetry SDK)

jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

opentelemetry-collector:
  enabled: false

default:
  envOverrides:
    # Override the value baked into the chart (defaults to "otel-collector",
    # which was the Service name of the bundled collector). Point the demo apps
    # at the operator's DaemonSet collector instead.
    - name: OTEL_COLLECTOR_NAME
      value: dash0-operator-opentelemetry-collector-service.dash0-system.svc.cluster.local
    # The chart advertises service.namespace via the pod annotation
    # `resource.opentelemetry.io/service.namespace: otel-demo`, but that
    # annotation is only consumed by the OpenTelemetry Operator's admission
    # webhook — we run the Dash0 operator with instrumentWorkloads.mode=none,
    # so nothing picks it up and every SDK ships spans with an empty
    # service.namespace. Set it here so every SDK picks it up via
    # OTEL_RESOURCE_ATTRIBUTES.
    #
    # Note: the chart only translates OTEL_RESOURCE_ATTRIBUTES_EXTRA into
    # OTEL_RESOURCE_ATTRIBUTES when set on a component's own envOverrides
    # (see templates/_pod.tpl). At the default level it would pass through
    # as an unrecognized env var, so set OTEL_RESOURCE_ATTRIBUTES directly.
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: service.namespace=otel-demo

components:
  frontend:
    # dash0-demo fork of the frontend. Carries two patches vs. upstream:
    #   - InstrumentationMiddleware sends its own 500 response instead of
    #     re-throwing (fork PR #81) so Next.js doesn't print multi-line
    #     stack traces the filelog receiver would split.
    #   - The built-in OpenTelemetry-JS Web SDK is deleted; @dash0/sdk-web
    #     is imported directly by _app.tsx and configured from window.ENV
    #     (fork PR #96). This obsoletes the Envoy Lua injection and the
    #     `/otlp-http/*` 204 sink route on the frontend-proxy.
    # SHA-immutable tag (built by .github/workflows/dash0-build-images.yml
    # in the fork). Bump this when landing further patches; drop the
    # override entirely once both patches are upstream and
    # `otel_demo_chart_version` is bumped past them.
    imageOverride:
      repository: ghcr.io/dash0-demo/opentelemetry-demo
      tag: 65b18420ea3238e824798dd1ad0f84bf5f0f3015-frontend
    # Feeds pages/_document.tsx which inlines these into `window.ENV` for
    # the Dash0 Web SDK's client-side init (see the fork's
    # utils/telemetry/Dash0WebSdk.ts). Terraform passes these in via
    # `components.frontend.envOverrides` in main.tf so per-tenant values
    # (VCS metadata, service namespace) stay out of the image.
  product-catalog:
    # dash0-demo fork of the product-catalog service. Patches vs. upstream:
    #   - Failure injection is gated on a hardcoded set of five SKUs
    #     (OLJCESPC7Z, L9ECAV7KIM, 6E92ZMYYFZ, 9SIQT8TOJO, HQTGWGPNH4)
    #     rather than a single one, and the actual per-request failure
    #     rate is controlled by the `PRODUCT_CATALOG_FAILURE_PERCENT`
    #     env var below (0..100, defaults to 100, values clamped).
    #     The `productCatalogFailure` feature flag stays as a simple
    #     arm-switch: on means apply the percent; off means never fail
    #     (fork PR #98).
    #   - Three redundant `span.AddEvent` calls in GetProduct removed
    #     (the same info was already on `span.SetStatus` or in a
    #     structured log line right after) (fork PR #98).
    #   - Pre-otelconf SDK init restored so
    #     `OTEL_EXPORTER_OTLP_ENDPOINT` is read natively — upstream's
    #     `otelconf.NewSDK(WithContext(ctx))` returns a no-op SDK
    #     when no `OTEL_CONFIG_FILE` is mounted (fork PR #100).
    #   - flagd Connect RPC client instrumented with
    #     `WithOtelInterceptor(true)` so every flag evaluation emits a
    #     CLIENT span and product-catalog appears as a `depends on
    #     flagd` edge in the service map (fork PR #101).
    imageOverride:
      repository: ghcr.io/dash0-demo/opentelemetry-demo
      tag: a08acbe12e97dd53981c935e568ffc3c33d016f7-product-catalog
    envOverrides:
      # 50 percent per-request failure across the five targeted SKUs.
      # Demo-visible error rate for the product-catalog service — with
      # five of ten SKUs eligible, this yields ~25 percent demo-wide
      # error traffic on GetProduct, which is enough to trigger our
      # product-catalog check rules and keep error-shaped signals
      # prominent in the traces / logs / service-map views.
      - name: PRODUCT_CATALOG_FAILURE_PERCENT
        value: "50"
  flagd:
    sidecarContainers: []
    # Chart 0.40.9 pins flagd v0.12.9, which only exposes the
    # `flagd.evaluation.v1.Service/*` Connect RPC endpoints. The Go SDK
    # provider bundled in the product-catalog service (v2.2.0) calls
    # `flagd.evaluation.v2.Service/*` and gets `unimplemented: 404 Not Found`
    # for every flag evaluation, silently falling back to the default value
    # (false) — which is why the `productCatalogFailure` flag never fires.
    # flagd v0.14.0+ registers both v1 and v2 endpoints, so bumping the
    # server image restores the Go SDK's flag evaluations without touching
    # the fork.
    imageOverride:
      repository: ghcr.io/open-feature/flagd
      tag: v0.14.0
    # flagd v0.13+ replaced its bespoke OTel setup with the OpenTelemetry
    # `autoexport` package, which reads only the standard `OTEL_*` env vars.
    # The chart still ships `FLAGD_METRICS_EXPORTER=otel` and
    # `FLAGD_OTEL_COLLECTOR_URI=...` (pinned for v0.12.9) — those become
    # no-ops on v0.14.0, which is why flagd stopped emitting spans / metrics
    # after the image bump. Set the standard OTLP env vars so autoexport
    # sends traces and metrics to the Dash0 operator's collector.
    #
    # `$(OTEL_COLLECTOR_NAME)` resolves against the chart's default
    # envOverride (see the `default.envOverrides` block above), so the
    # collector target stays in one place.
    envOverrides:
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: grpc
      - name: OTEL_TRACES_EXPORTER
        value: otlp
      - name: OTEL_METRICS_EXPORTER
        value: otlp
      # Bump this value to force a flagd pod restart, which re-reads the
      # ConfigMap via the init container and resets any UI-driven flag toggles
      # back to the defaults baked in demo.flagd.json.
      # Last bumped: 2026-07-10 — reset paymentFailure from 90% back to off.
      - name: FLAGD_RESTART_MARKER
        value: "2026-07-10"
    # Mount the Terraform-managed `flagd-config-override` ConfigMap under the
    # `config-ro` volume instead of the chart-generated `flagd-config`. The
    # chart's init container copies `/config-ro/demo.flagd.json` into an
    # emptyDir before flagd starts — since the volume name (`config-ro`) is
    # unchanged, the init container and flagd command still work.
    #
    # This survives flagd pod restarts: the chart's default config resets any
    # UI-driven toggles (like turning `productCatalogFailure` on) whenever
    # flagd's pod is recreated. Baking the desired defaults into a ConfigMap
    # we control makes the demo state durable.
    additionalVolumes:
      - name: config-ro
        configMap:
          name: flagd-config-override
  load-generator:
    # Run Locust in dual-user mode: plain HTTP (`WebsiteUser`) for backend
    # load, plus Playwright-driven headless Chromium (`WebsiteBrowserUser`)
    # so the Dash0 Web SDK — injected into every HTML response by the
    # frontend-proxy's Envoy Lua filter (see
    # deployment/terraform/frontend-proxy/envoy.tmpl.yaml) — actually
    # executes in a real browser and produces Web Monitoring signals
    # (sessions, page views, resource timings) against the reserved public
    # frontend IP without needing external drivers.
    #
    # Locust distributes users evenly across the two classes by default, so
    # 20 users → ~10 concurrent headless Chromium tabs. Chromium alone is
    # ~150 MiB per instance; the chart's default 1500Mi limit OOMs the pod
    # once browser traffic is on, so raise memory to 3000Mi and pin CPU
    # (Playwright is CPU-heavy). Autopilot needs an explicit request or it
    # provisions the minimum burstable slice, which throttles Chromium
    # startup.
    envOverrides:
      - name: LOCUST_USERS
        value: "20"
      - name: LOCUST_SPAWN_RATE
        value: "2"
      - name: LOCUST_BROWSER_TRAFFIC_ENABLED
        value: "true"
    resources:
      requests:
        cpu: "2"
        memory: 3000Mi
      limits:
        cpu: "2"
        memory: 3000Mi
    # Three mounts:
    #   1. /dev/shm — Kubernetes defaults this tmpfs to 64 MiB, and Chromium
    #      wants more headroom to render pages. 512 MiB is safe.
    #   2. /usr/src/app/locustfile.py — the chart's default locustfile has a
    #      Playwright bug (WebsiteBrowserUser references self.tracer, which
    #      isn't reachable from its async @task methods under the plugin's
    #      gevent+asyncio interop → AttributeError swallowed by try/except →
    #      Locust reports 10 browser users spawned but zero HTTP requests
    #      ever reach frontend-proxy). Our fork also adds seed_person(page)
    #      calls in each browser task, which inject window.seed with a
    #      persistent email + geo into the page so Web Monitoring sessions
    #      differentiate by identity and country/continent rather than all
    #      collapsing to a single anonymous German visitor (the geo of the
    #      GKE eu-west-1 pod IP range).
    #   3. /usr/src/app/people.json — extends the upstream 9-person set
    #      with countryCode/continentCode fields (needed by seed_person)
    #      and a few EU/AS/SA entries. Overlays the image's baked-in file
    #      via subPath.
    # Sources live in deployment/terraform/loadgen/ and are delivered via
    # the `load-generator-locustfile-override` ConfigMap (see main.tf).
    additionalVolumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 512Mi
      - name: locustfile-override
        configMap:
          name: load-generator-locustfile-override
    additionalVolumeMounts:
      - name: dshm
        mountPath: /dev/shm
      - name: locustfile-override
        mountPath: /usr/src/app/locustfile.py
        subPath: locustfile.py
      - name: locustfile-override
        mountPath: /usr/src/app/people.json
        subPath: people.json
