# Helm values for the OpenTelemetry demo with all telemetry exported to Dash0.
# Tested against chart open-telemetry/opentelemetry-demo 0.40.9 (appVersion 2.2.0).
#
# Local UI backends (Jaeger, Prometheus, Grafana, OpenSearch) are disabled — Dash0
# is the only destination. The flagd-ui admin sidecar is also disabled because it
# has been observed OOMing under modest memory limits.
#
# The collector reads its Dash0 endpoint / dataset / auth token from a Secret
# named `dash0-auth` in the `otel-demo` namespace. Terraform manages this Secret
# when applied via deployment/terraform; for manual installs, create it with:
#   kubectl -n otel-demo create secret generic dash0-auth \
#     --from-literal=token=<DASH0_AUTH_TOKEN> \
#     --from-literal=dataset=wad-demo \
#     --from-literal=endpoint=https://ingress.eu-west-1.aws.dash0.com

jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

components:
  flagd:
    sidecarContainers: []

opentelemetry-collector:
  extraEnvs:
    - name: DASH0_AUTH_TOKEN
      valueFrom:
        secretKeyRef:
          name: dash0-auth
          key: token
    - name: DASH0_DATASET
      valueFrom:
        secretKeyRef:
          name: dash0-auth
          key: dataset
    - name: DASH0_OTLP_ENDPOINT
      valueFrom:
        secretKeyRef:
          name: dash0-auth
          key: endpoint
  config:
    receivers:
      otlp:
        protocols:
          http:
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"
      kafkametrics:
        scrapers:
          - brokers
          - topics
          - consumers
        brokers:
          - kafka:9092
        collection_interval: 10s
    exporters:
      otlp/jaeger: null
      otlphttp/prometheus: null
      opensearch: null
      otlphttp/dash0:
        endpoint: ${env:DASH0_OTLP_ENDPOINT}
        headers:
          Authorization: "Bearer ${env:DASH0_AUTH_TOKEN}"
          Dash0-Dataset: "${env:DASH0_DATASET}"
        sending_queue:
          batch: {}
    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      resourcedetection:
        detectors: [env, system]
      resource:
        attributes:
          - key: service.instance.id
            from_attribute: k8s.pod.uid
            action: insert
    connectors:
      spanmetrics: {}
    service:
      pipelines:
        traces:
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [otlphttp/dash0, spanmetrics]
        metrics:
          receivers: [otlp, kafkametrics, spanmetrics]
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [otlphttp/dash0]
        logs:
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [otlphttp/dash0]
      telemetry:
        metrics:
          level: detailed
          readers:
            - periodic:
                interval: 10000
                timeout: 5000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://otel-collector:4318
                    insecure: true
